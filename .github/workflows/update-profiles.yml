name: Update profile screenshots

on:
  schedule:
    # Every Monday at 02:00 UTC.
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Capture screenshots and refresh README
        run: python scripts/update_profiles.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add assets/kg_profile.png README.md
            git commit -m "chore: weekly refresh of Kaggle profile snapshot"
            git push
          else
            echo "No changes to commit."
          fi
